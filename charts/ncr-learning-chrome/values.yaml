replicaCount: 1

image:
  repository: ghcr.io/praveenaggarwal/ncr-learning-chrome
  tag: "2.0.0"
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-pull-secret

chrome:
  url: "http://example.com"
  kiosk: true
  disablePinch: true

# Node selector for targeting specific nodes with displays
# Leave empty {} to deploy on any available node
# Examples:
#   nodeSelector:
#     cl:browser-01: ""        # Deploy to nodes labeled with cl:browser-01
#   nodeSelector:
#     cl:digital-signage: ""   # Deploy to all nodes with digital-signage label
#   nodeSelector:
#     display-enabled: "true"  # Deploy to nodes with display-enabled=true
# Multiple nodes with matching labels will each get a pod (if replicaCount > 1)
nodeSelector: {}

# Tolerations for node taints (if display nodes have taints)
tolerations: []
