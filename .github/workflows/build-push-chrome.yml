name: Build and Push Chrome Browser

on:
  push:
    branches: [main]
    paths:
      - 'chrome-browser/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./chrome-browser
          push: true
          provenance: false
          tags: |
            ghcr.io/praveenaggarwal/ncr-learning-chrome:2.0.0
            ghcr.io/praveenaggarwal/ncr-learning-chrome:latest
